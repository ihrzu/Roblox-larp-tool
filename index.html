<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace - Roblox</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000000; color: #ffffff; font-family: 'HCo Gotham SSm', sans-serif; }
        .rbx-nav { background-color: #111214; border-bottom: 1px solid #393b3d; }
        .market-card { background-color: #232527; border-radius: 8px; transition: background-color 0.15s; }
        .market-card:hover { background-color: #393b3d; transform: scale(1.01); }
        .sidebar { background-color: #111214; border-right: 1px solid #393b3d; }
        .sb-icon { width: 18px; height: 18px; fill: #babbbe; } /* Default icon color */
        .btn-robux { background-color: #0084ff; border-radius: 8px; font-weight: 700; color: white; }
        .game-card { background-color: #232527; border-radius: 8px; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <nav class="rbx-nav h-14 flex items-center justify-between px-4 z-50">
        <div class="flex items-center gap-4">
            <button onclick="toggleSidebar()" class="text-3xl p-2">
                <svg viewBox="0 0 1024 1024" width="24" height="24" fill="white"><path d="M128 256h768v128H128zm0 256h768v128H128zm0 256h768v128H128z"></path></svg>
            </button>
            <div class="font-black text-2xl tracking-tighter italic">ROBLOX</div>
            <div class="hidden lg:flex gap-6 text-sm font-semibold ml-4">
                <span>Charts</span>
                <span class="border-b-2 border-white pb-3.5">Marketplace</span>
                <span>Create</span>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="relative flex items-center">
                <svg viewBox="0 0 1024 1024" width="16" height="16" fill="#888" class="absolute left-3"><path d="M963.6 864L761.3 661.7c52.2-61.1 83.3-140.6 83.3-227.1 0-192.5-156-348.5-348.5-348.5S147.6 242.1 147.6 434.6s156 348.5 348.5 348.5c86.5 0 166-31.1 227.1-83.3L925.5 902.1c11.1 11.1 29 11.1 40.1 0 11-11.1 11-29-.1-40.1zM496.1 721.7c-158.6 0-287.1-128.5-287.1-287.1s128.5-287.1 287.1-287.1c158.6 0 287.1 128.5 287.1 287.1s-128.5 287.1-287.1 287.1z"></path></svg>
                <input type="text" placeholder="Korblox Deathspeaker" class="bg-[#393b3d] rounded-md pl-10 pr-3 py-1 text-sm w-48 md:w-80">
            </div>
            <div class="flex items-center gap-1 font-bold">
                <svg viewBox="0 0 1024 1024" width="14" height="14" fill="#00c873"><path d="M496.1 928C242 928 32 718 32 463.9s210-464.1 464.1-464.1S928.1 210 928.1 464.1 721.7 928 496.1 928z m0-864c-220.1 0-399.9 179.8-399.9 399.9s179.8 400 399.9 400 400.1-179.9 400.1-400S716.3 64 496.1 64z m162 576.1l-180-60L382 680.1h136.1v80h-240v-80L434 520.1 298.1 440V360h240v80l-160 80 136.1 60L658 500.1H518.1v-80h240v80L622.1 640z"></path></svg>
                <span id="bal-top">6,142</span>
            </div>
            <div class="w-8 h-8 rounded-full bg-gray-600 overflow-hidden border border-gray-500">
                <img src="https://tr.rbxcdn.com/30DAY-Avatar-Png" class="w-full h-full object-cover">
            </div>
        </div>
    </nav>

    <div class="flex flex-1 overflow-hidden">
        <aside id="sidebar" class="sidebar p-4 space-y-3 text-sm font-semibold text-gray-300 w-64 md:block hidden">
            <div onclick="showPage('market')" class="flex items-center gap-3.5 p-2.5 hover:bg-white/10 rounded-md cursor-pointer">
                <svg class="sb-icon" viewBox="0 0 1024 1024"><path d="M946.5 463.6L543.8 63.8c-17.7-17.7-46.3-17.7-64 0L76.9 463.6c-20.1 20.1-5.9 54.4 22.6 54.4h96v360c0 17.7 14.3 32 32 32h192c17.7 0 32-14.3 32-32V672c0-17.7 14.3-32 32-32h64c17.7 0 32 14.3 32 32v208c0 17.7 14.3 32 32 32h192c17.7 0 32-14.3 32-32V518h96c28.6 0 42.7-34.3 22.6-54.4z"></path></svg>
                Marketplace
            </div>
            <div class="flex items-center gap-3.5 p-2.5 hover:bg-white/10 rounded-md cursor-pointer">
                <svg class="sb-icon" viewBox="0 0 1024 1024"><path d="M512 592c114.9 0 208-93.1 208-208S626.9 176 512 176 304 269.1 304 384s93.1 208 208 208zM512 656c-176.7 0-320 143.3-320 320v16h640v-16c0-176.7-143.3-320-320-320z"></path></svg>
                Profile
            </div>
            <div class="flex items-center gap-3.5 p-2.5 hover:bg-white/10 rounded-md cursor-pointer">
                <svg class="sb-icon" viewBox="0 0 1024 1024"><path d="M912 176H112c-44.2 0-80 35.8-80 80v512c0 44.2 35.8 80 80 80h800c44.2 0 80-35.8 80-80V256c0-44.2-35.8-80-80-80zM512 560L160 288h704L512 560zm0 64l352-272v416H160V352l352 272z"></path></svg>
                Messages
            </div>
            <div class="flex items-center gap-3.5 p-2.5 hover:bg-white/10 rounded-md cursor-pointer">
                <svg class="sb-icon" viewBox="0 0 1024 1024"><path d="M864 128H160c-44.2 0-80 35.8-80 80v608c0 44.2 35.8 80 80 80h704c44.2 0 80-35.8 80-80V208c0-44.2-35.8-80-80-80zm0 688H160V208h704v608zM416 320c-17.7 0-32 14.3-32 32v320c0 17.7 14.3 32 32 32s32-14.3 32-32V352c0-17.7-14.3-32-32-32z m224 0c-17.7 0-32 14.3-32 32v320c0 17.7 14.3 32 32 32s32-14.3 32-32V352c0-17.7-14.3-32-32-32z"></path></svg>
                Inventory
            </div>
            <div onclick="showPage('transactions')" class="flex items-center gap-3.5 p-2.5 hover:bg-white/10 rounded-md cursor-pointer">
                <svg class="sb-icon" viewBox="0 0 1024 1024"><path d="M912 176H112c-44.2 0-80 35.8-80 80v512c0 44.2 35.8 80 80 80h800c44.2 0 80-35.8 80-80V256c0-44.2-35.8-80-80-80zM512 560L160 288h704L512 560zm0 64l352-272v416H160V352l352 272z"></path></svg>
                Transactions
            </div>
            <hr class="border-gray-800 my-4">
            <button onclick="addRobux()" class="w-full btn-robux text-white py-2.5 text-xs font-black uppercase shadow-lg tracking-wider">Cheat +10,000 R$</button>
        </aside>

        <main id="main-content" class="flex-1 overflow-y-auto p-6 bg-[#111214]">
            
            <div id="view-market" class="max-w-6xl mx-auto">
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-3xl font-black tracking-tighter">Marketplace</h1>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-5">
                    <div class="market-card p-3.5 border border-gray-700" onclick="buy('Korblox Deathspeaker', 17000)">
                        <div class="aspect-square bg-black/40 rounded-lg mb-3 flex items-center justify-center text-5xl">💀</div>
                        <p class="text-xs font-bold truncate">Korblox Deathspeaker</p>
                        <p class="text-[10px] text-gray-500">By Roblox</p>
                        <p class="text-xs font-bold mt-1.5 flex items-center gap-1.5"><svg viewBox="0 0 1024 1024" width="10" height="10" fill="#00c873"><path d="M496.1 928C242 928 32 718 32 463.9s210-464.1 464.1-464.1S928.1 210 928.1 464.1 721.7 928 496.1 928z m0-864c-220.1 0-399.9 179.8-399.9 399.9s179.8 400 399.9 400 400.1-179.9 400.1-400S716.3 64 496.1 64z"></path></svg>17,000</p>
                    </div>
                </div>
            </div>

            <div id="view-transactions" class="hidden max-w-4xl mx-auto space-y-6">
                <h1 class="text-3xl font-black tracking-tighter">My Transactions</h1>
                <div class="bg-[#232527] p-6 rounded-lg border border-gray-700 space-y-4 text-sm">
                    <div class="flex justify-between border-b border-gray-700 pb-3"><span class="font-bold text-gray-400 uppercase text-xs">Summary</span> <span>Amount</span></div>
                    <div class="flex justify-between text-gray-400 italic"><span>Cheated Funds (Grants)</span> <span id="purchase-log">⟡ 0</span></div>
                    <div class="flex justify-between font-bold text-lg"><span>My Balance:</span> <span>⟡ <span id="trans-bal">6,142</span></span></div>
                </div>
                <div id="logs" class="bg-black/60 font-mono text-gray-500 text-[10px] h-32 overflow-y-auto p-3 rounded">
                    [SYSTEM READY] Archival Logs...
                </div>
            </div>

        </main>
    </div>

    <script>
        let balance = 6142;
        let grants = 0;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('hidden');
        }

        function showPage(page) {
            document.getElementById('view-market').classList.add('hidden');
            document.getElementById('view-transactions').classList.add('hidden');
            if(page === 'market') document.getElementById('view-market').classList.remove('hidden');
            if(page === 'transactions') document.getElementById('view-transactions').classList.remove('hidden');
        }

        function addRobux() {
            balance += 10000;
            grants += 10000;
            updateUI();
            log("FUNDS INJECTED: +10,000");
        }

        function buy(name, price) {
            if (balance >= price) {
                balance -= price;
                updateUI();
                alert(`SUCCESS! "${name}" added to inventory.`);
                log(`PURCHASE: ${name} (-${price})`);
            } else { alert("Insufficient Robux!"); }
        }

        function updateUI() {
            document.getElementById('bal-top').innerText = balance.toLocaleString();
            document.getElementById('trans-bal').innerText = balance.toLocaleString();
            document.getElementById('purchase-log').innerText = "⟡ " + grants.toLocaleString();
        }

        function log(msg) {
            const l = document.getElementById('logs');
            l.innerHTML = `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>` + l.innerHTML;
        }
    </script>
</body>
</html>
